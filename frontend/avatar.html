<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Avatar</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* CRITICAL: Pure black background */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Keeps your avatar from stretching */
        }
    </style>
</head>
<body>
    <div id="start-overlay" style="position: absolute; inset: 0; background: rgba(0,0,0,0.8); color: white; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; z-index: 10;">
        Tap anywhere to Start Hologram
    </div>

    <video id="holoVideo" autoplay loop muted playsinline>
        <source id="videoSource" src="dle.mp4" type="video/mp4">
    </video>

    <script>
        // For mobile browsers: User must tap the screen once to allow programmatic video swapping
        document.getElementById('start-overlay').addEventListener('click', function() {
            this.style.display = 'none';
            document.getElementById('holoVideo').play();
            console.log("Hologram interaction unlocked");
        });

        const video = document.getElementById('holoVideo');
        const videoSource = document.getElementById('videoSource');

        // Map the backend commands to your exact filenames
        const videoFiles = {
            'idle': 'dle.mp4',
            'talking': 'Talking20001-0102.mp4',
            'success': 'Celebrating0001-0250.mp4',
            'error': 'Defeated0001-0250.mp4'
        };

        // Connect to FastAPI WebSocket backend dynamically based on current host
        const wsUrl = `ws://${window.location.hostname}:8000/ws/avatar`;
        const ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            console.log(`Connected to AI Buddy Avatar Backend at ${wsUrl}!`);
        };

        ws.onmessage = (event) => {
            let data;
            try {
                data = JSON.parse(event.data);
            } catch (e) {
                // Fallback for simple state strings
                data = { state: event.data };
            }

            const state = data.state;
            
            if (videoFiles[state]) {
                const currentFile = videoSource.getAttribute('src');
                if (currentFile !== videoFiles[state]) {
                    // Instantly swap the video file and play
                    videoSource.setAttribute('src', videoFiles[state]);
                    
                    // Stop looping for all reactions (including talking). ONLY loop for idle.
                    if (state === 'idle') {
                        video.loop = true;
                        video.onended = null;
                    } else {
                        video.loop = false;
                        video.onended = () => {
                            if (videoSource.getAttribute('src') !== videoFiles['idle']) {
                                videoSource.setAttribute('src', videoFiles['idle']);
                                video.loop = true;
                                video.load();
                                video.play();
                            }
                        };
                    }
                    
                    video.load();
                    video.play();
                }
            }

            // Handle Text-to-Speech
            if (state === 'talking' && data.text) {
                const synth = window.speechSynthesis;
                synth.cancel(); // Stop any previous speech
                
                // Clean markdown from the text
                const cleanText = data.text.replace(/[\*\#\`\_]/g, '');
                const utterance = new SpeechSynthesisUtterance(cleanText);
                
                // Select a male voice if available
                const voices = synth.getVoices();
                // Find a male voice (often has 'male' or 'guy' or specific names like 'Google UK English Male' in name)
                const maleVoice = voices.find(v => v.name.toLowerCase().includes('male') || v.name.toLowerCase().includes('guy') || v.name.includes('David') || v.name.includes('Mark'));
                if (maleVoice) {
                    utterance.voice = maleVoice;
                }
                
                // Prevent garbage collection bug in some browsers
                window.currentUtterance = utterance;
                
                utterance.onend = () => {
                    // Switch back to idle when done speaking
                    if (videoFiles['idle'] && videoSource.getAttribute('src') !== videoFiles['idle']) {
                        videoSource.setAttribute('src', videoFiles['idle']);
                        video.loop = true;
                        video.load();
                        video.play();
                    }
                };
                
                // Fallback in case onend fails to fire (WebKit bug)
                utterance.onerror = utterance.onend;
                
                synth.speak(utterance);
            } else if (state === 'idle') {
                window.speechSynthesis.cancel();
            }
        };
    </script>
</body>
</html>
